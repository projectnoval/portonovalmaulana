/* ╔══════════════════════════════════════════════════════╗ */
/* ║   VARIABLES — Obsidian × Gold Antik                 ║ */
/* ╚══════════════════════════════════════════════════════╝ */
:root {
  --bg:       #09090b;
  --bg2:      #0f0f12;
  --surface:  #141418;
  --surface2: #1b1b21;
  --border:   rgba(180,148,82,0.17);
  --border2:  rgba(180,148,82,0.30);
  --gold:     #b49452;
  --gold-lt:  #d4b87a;
  --gold-dim: #7a6435;
  --ivory:    #f0ead8;
  --silver:   #a8a898;
  --text:     #e6e0d0;
  --muted:    #7a7868;
  --white:    #faf8f2;
  --serif:    'Cormorant Garamond', Georgia, serif;
  --mono:     'Space Mono', monospace;
  --body:     'Libre Baskerville', Georgia, serif;
  --radius:   8px;
  --glow:     0 0 28px rgba(180,148,82,0.26);
  --glow-sm:  0 0 12px rgba(180,148,82,0.16);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.78;
  overflow-x: hidden;
  min-height: 100vh;
}

#snow-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.42;
}
#app { position: relative; z-index: 1; }

/* ╔══════════════════════════════════════════════════════╗ */
/* ║   NAVIGATION                                        ║ */
/* ╚══════════════════════════════════════════════════════╝ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 66px;
  background: rgba(9,9,11,0.84);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: var(--serif);
  font-size: 1.15rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold-lt);
}
.nav-logo em { font-style: normal; color: var(--gold); font-weight: 400; }

.nav-links { display: flex; gap: 4px; list-style: none; }
.nav-links li a {
  display: inline-block; padding: 7px 14px;
  font-family: var(--mono); font-size: 0.68rem;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  border: 1px solid transparent; border-radius: 3px;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.nav-links li a:hover  { color: var(--gold-lt); border-color: var(--border); }
.nav-links li a.active {
  color: var(--gold-lt); border-color: var(--gold);
  background: rgba(180,148,82,0.07);
}

.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; }
.hamburger span {
  display: block; width: 24px; height: 1.5px;
  background: var(--gold); border-radius: 2px;
  transition: transform 0.3s, opacity 0.3s;
}

/* ╔══════════════════════════════════════════════════════╗ */
/* ║   SECTIONS                                          ║ */
/* ╚══════════════════════════════════════════════════════╝ */
.section {
  min-height: 100vh; padding: 104px 48px 88px;
  max-width: 1120px; margin: 0 auto;
}
.section:not(#home) { border-top: 1px solid var(--border); scroll-margin-top: 66px; }

.section-header { margin-bottom: 60px; display: flex; align-items: center; gap: 22px; }
.section-number {
  font-family: var(--body); font-size: 0.66rem;
  color: var(--gold); letter-spacing: 0.22em;
}
.section-title {
  font-family: var(--serif); font-size: clamp(2.4rem, 5vw, 4rem);
  font-weight: 600; letter-spacing: 0.08em;
  color: var(--white); line-height: 1; text-transform: uppercase;
}
.section-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

/* ╔══════════════════════════════════════════════════════╗ */
/* ║   HOME                                              ║ */
/* ╚══════════════════════════════════════════════════════╝ */
#home {
  display: flex; flex-direction: column;
  justify-content: center; align-items: flex-start;
  min-height: 100vh; scroll-margin-top: 66px; position: relative;
}
#home::before {
  content: '';
  position: absolute; left: -48px; top: 18%; bottom: 18%;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--gold-dim), transparent);
}

.home-greeting {
  font-family: var(--serif); font-size: clamp(1.0rem,1.7vw,1.2rem);
  font-weight: 500; color: var(--gold-lt); letter-spacing: 0.3em; text-transform: uppercase;
  margin-bottom: 18px; opacity: 0;
  animation: fadeUp 0.9s 0.3s forwards;
}
.home-name-wrapper { margin-bottom: 24px; opacity: 0; animation: fadeUp 0.9s 0.6s forwards; }

#text-pressure-container {
  font-family: var(--serif); font-weight: 700;
  font-size: clamp(2.2rem, 7.5vw, 7.2rem);
  line-height: 0.95; letter-spacing: 0.02em;
  color: var(--white); cursor: default; user-select: none;
  display: inline-flex; flex-wrap: wrap; column-gap: 0.4em; row-gap: 0.15em;
}
#text-pressure-container .char {
  display: inline-block;
  transition: color 0.1s ease, text-shadow 0.1s ease, transform 0.08s ease;
}

.home-divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
  margin: 22px 0; opacity: 0;
  animation: fadeUp 0.9s 0.85s forwards;
}
.home-tagline {
  font-family: var(--serif); font-size: clamp(1.05rem, 2.3vw, 1.42rem);
  font-style: italic; font-weight: 500; color: var(--gold-lt);
  max-width: 560px; margin-bottom: 14px;
  opacity: 0; animation: fadeUp 0.9s 1.0s forwards;
}
.home-subtext {
  font-family: var(--body); font-size: 0.9rem; color: var(--muted);
  max-width: 500px; line-height: 1.92; margin-bottom: 44px;
  opacity: 0; animation: fadeUp 0.9s 1.15s forwards;
}

.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 12px;
  width: 250px; height: 50px; box-sizing: border-box;
  padding: 0 20px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: var(--bg); font-family: var(--body);
  font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  border: 1px solid transparent; border-radius: 2px; cursor: pointer; text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s, filter 0.2s, background-color 0.2s, border-color 0.2s, color 0.2s;
  opacity: 0; animation: fadeUp 0.9s 1.35s forwards;
  box-shadow: var(--glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  filter: brightness(1.12);
  box-shadow: 0 0 40px rgba(180,148,82,0.42);
}

.home-scroll-hint {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  opacity: 0; animation: fadeUp 1s 2.2s forwards;
}
.home-scroll-hint span { font-family: var(--body); font-size: 0.58rem; letter-spacing: 0.26em; color: var(--muted); }
.scroll-dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; animation: bounce 1.6s infinite; }

/* ╔══════════════════════════════════════════════════════╗ */
/* ║   PROFILE                                           ║ */
/* ╚══════════════════════════════════════════════════════╝ */
.profile-grid { display: grid; grid-template-columns: 280px 1fr; gap: 64px; align-items: start; }
.profile-photo-wrap { position: relative; }
.profile-photo-frame {
  width: 260px; height: 320px; border-radius: 4px; overflow: hidden;
  border: 1px solid var(--border2); position: relative;
}
.profile-photo-frame::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 55%, rgba(9,9,11,0.55));
}
.profile-photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
.profile-photo-deco {
  position: absolute; top: -10px; right: -10px;
  width: 260px; height: 320px;
  border: 1px solid rgba(180,148,82,0.2);
  border-radius: 4px; z-index: -1;
}
  
.profile-details h3 {
  font-family: var(--serif); font-size: clamp(1.9rem,3.8vw,2.9rem);
  font-weight: 600; letter-spacing: 0.05em; color: var(--white); line-height: 1.1; margin-bottom: 6px;
}
  
.profile-role {
  font-family: var(--body); font-size: 0.78rem; color: var(--gold);
  font-weight: 600; letter-spacing: 0.18em; margin-bottom: 26px;
}
.profile-about {
  font-size: 0.9rem; color: var(--muted); line-height: 1.92;
  margin-bottom: 30px; padding-left: 20px; border-left: 1px solid var(--gold-dim);
}

.profile-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
.info-item { padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; }
.info-label { font-family: var(--body); font-size: 0.58rem; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 3px; }
.info-value { font-size: 0.86rem; color: var(--text); font-family: var(--body); }

.skills-title { font-family: var(--body); font-size: 0.62rem; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; }
.skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.skill-tag {
  padding: 5px 14px;
  background: rgba(180,148,82,0.06); border: 1px solid rgba(180,148,82,0.22);
  border-radius: 100px; font-family: var(--body); font-size: 0.66rem;
  color: var(--gold-lt); letter-spacing: 0.05em;
  transition: background 0.2s, box-shadow 0.2s;
}
.skill-tag:hover { background: rgba(180,148,82,0.14); box-shadow: var(--glow-sm); }

/* ╔══════════════════════════════════════════════════════╗ */
/* ║   CARD GRID — Photo                                 ║ */
/* ╚══════════════════════════════════════════════════════╝ */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 24px; }

.photo-card {
  border-radius: var(--radius); overflow: hidden; background: var(--surface);
  border: 1px solid var(--border); cursor: pointer; position: relative;
  transition: transform 0.32s, box-shadow 0.32s, border-color 0.32s;
  aspect-ratio: 4/3;
}
.photo-card:hover { transform: translateY(-7px) scale(1.015); box-shadow: 0 18px 52px rgba(0,0,0,0.55), var(--glow); border-color: var(--border2); }
.photo-card img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.5s, filter 0.4s;
  filter: saturate(0.6) brightness(0.85);
}
.photo-card:hover img { transform: scale(1.06); filter: saturate(0.88) brightness(1.02); }

.photo-card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(9,9,11,0.97) 0%, rgba(9,9,11,0.52) 55%, transparent 100%);
  display: flex; flex-direction: column; justify-content: flex-end; padding: 22px;
  opacity: 0; transition: opacity 0.35s;
}
.photo-card:hover .photo-card-overlay { opacity: 1; }
.photo-card-overlay h3 {
  font-family: var(--serif); font-size: 1.3rem; font-weight: 600;
  color: var(--white); margin-bottom: 5px; letter-spacing: 0.03em;
}
.photo-card-overlay p {
  font-size: 0.78rem; color: var(--silver); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.photo-card-overlay .card-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
.card-tag-badge {
  padding: 2px 9px; background: rgba(180,148,82,0.18); border-radius: 100px;
  font-family: var(--body); font-size: 0.6rem; color: var(--gold-lt); letter-spacing: 0.05em;
}

/* ╔══════════════════════════════════════════════════════╗ */
/* ║   PROJECT CARD                                      ║ */
/* ╚══════════════════════════════════════════════════════╝ */
.project-card {
  border-radius: var(--radius); overflow: hidden; background: var(--surface);
  border: 1px solid var(--border);
  transition: transform 0.32s, box-shadow 0.32s, border-color 0.32s;
  display: flex; flex-direction: column;
}
.project-card:hover { transform: translateY(-7px); box-shadow: 0 18px 52px rgba(0,0,0,0.55), var(--glow); border-color: var(--border2); }
.project-card-img {
  width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
  filter: saturate(0.55) brightness(0.82); transition: filter 0.35s;
}
.project-card:hover .project-card-img { filter: saturate(0.82) brightness(1.02); }
.project-card-body { padding: 22px; flex: 1; display: flex; flex-direction: column; }
.project-card-body h3 { font-family: var(--serif); font-size: 1.3rem; font-weight: 600; color: var(--white); margin-bottom: 8px; }
.project-card-body p { font-size: 0.84rem; color: var(--muted); line-height: 1.78; flex: 1; margin-bottom: 16px; }
.project-card-meta {
  font-family: var(--body); font-size: 0.62rem; color: var(--gold);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px;
}
.project-card-links { display: flex; gap: 10px; flex-wrap: wrap; }

.btn-ghost {
  padding: 7px 15px; border: 1px solid var(--border2); border-radius: 2px;
  font-family: var(--body); font-size: 0.60rem; letter-spacing: 0.1em;
  color: var(--muted); text-decoration: none; text-transform: uppercase;
  transition: border-color 0.2s, color 0.2s;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold-lt); }
.btn-ghost.primary { border-color: var(--gold); color: var(--gold-lt); background: rgba(180,148,82,0.06); }

.cert-badge {
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px;
  background: rgba(9,9,11,0.9); border: 1px solid var(--gold);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--body); font-size: 0.62rem; color: var(--gold); z-index: 2;
}

/* ╔══════════════════════════════════════════════════════╗ */
/* ║   MODAL                                             ║ */
/* ╚══════════════════════════════════════════════════════╝ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  backdrop-filter: blur(10px); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal-box {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; max-width: 680px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  transform: scale(0.93); transition: transform 0.3s;
}
.modal-overlay.open .modal-box { transform: scale(1); }
.modal-img { width: 100%; max-height: 360px; object-fit: cover; border-radius: 8px 8px 0 0; display: block; filter: saturate(0.7); }
.modal-body { padding: 30px; }
.modal-body h2 { font-family: var(--serif); font-size: 1.85rem; font-weight: 600; color: var(--white); margin-bottom: 6px; letter-spacing: 0.04em; }
.modal-meta { font-family: var(--body); font-size: 0.66rem; color: var(--gold); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 18px; }
.modal-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.88; margin-bottom: 22px; }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px;

/* ══════════════════════════════════════════════════════
   PIXEL SNOW — palet emas & abu netral
══════════════════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('snow-canvas');
  const ctx    = canvas.getContext('2d');
  const COLORS = ['#b49452','#d4b87a','#7a6435','#a8a898','#f0ead8','#6e6a5e','#c8b88a'];
  const COUNT  = 115;
  let W, H, flakes = [];

  function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  function rnd(a,b) { return Math.random()*(b-a)+a; }
  function newFlake() {
    return { x:rnd(0,W), y:rnd(0,H), r:rnd(0.4,2.0), speed:rnd(0.15,0.55),
             drift:rnd(-0.25,0.25), color:COLORS[Math.floor(Math.random()*COLORS.length)], opacity:rnd(0.08,0.5) };
  }

  function init() { resize(); flakes = Array.from({length:COUNT}, newFlake); }
  function draw() {
    ctx.clearRect(0,0,W,H);
    flakes.forEach(f => {
      ctx.save(); ctx.globalAlpha=f.opacity; ctx.fillStyle=f.color;
      const s=Math.max(1,Math.round(f.r*2));
      ctx.fillRect(Math.round(f.x), Math.round(f.y), s, s);
      ctx.restore();
      f.y+=f.speed; f.x+=f.drift;
      if(f.y>H+4){f.y=-4;f.x=rnd(0,W);}
      if(f.x>W+4) f.x=-4;
      if(f.x<-4)  f.x=W+4;
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  init(); draw();
})();

/* ══════════════════════════════════════════════════════
   DECRYPTED TEXT HOVER — karakter hukum & formal
══════════════════════════════════════════════════════ */
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789§¶©®·—∫';

function decryptHover(el) {
  const orig = el.textContent;
  let iter, iv;
  el.addEventListener('mouseenter', () => {
    clearInterval(iv); iter = 0;
    iv = setInterval(() => {
      el.textContent = orig.split('').map((ch,i) =>
        i < Math.floor(iter) ? orig[i] : ch===' ' ? ' ' : CHARS[Math.floor(Math.random()*CHARS.length)]
      ).join('');
      iter += orig.length/7;
      if(iter>=orig.length){ el.textContent=orig; clearInterval(iv); }
    }, 38);
  });
  el.addEventListener('mouseleave', () => { clearInterval(iv); el.textContent=orig; });
}

/* ══════════════════════════════════════════════════════
   TEXT PRESSURE — ivory → gold shift
══════════════════════════════════════════════════════ */
function buildTextPressure(text) {
  const cont = document.getElementById('text-pressure-container');
  cont.innerHTML = '';
  const words = text.split(' ');
  words.forEach(word => {
    const wSpan = document.createElement('span');
    wSpan.className = 'word';
    wSpan.style.display = 'inline-flex';
    wSpan.style.flexWrap = 'nowrap';
    wSpan.style.columnGap = '0.18em';
    [...word].forEach(ch => {
      const s = document.createElement('span');
      s.className   = 'char';
      s.textContent = ch;
      wSpan.appendChild(s);
    });
    cont.appendChild(wSpan);
  });

  const MAX=200, BASE=400, MAX_W=700;

  function move(e) {
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    cont.querySelectorAll('.char').forEach(c => {
      const r  = c.getBoundingClientRect();
      const d  = Math.sqrt((cx-r.left-r.width/2)**2+(cy-r.top-r.height/2)**2);
      const t  = Math.max(0, 1-d/MAX);
      const w  = Math.round(BASE+(MAX_W-BASE)*t);
      const rv = Math.round(240-28*t), gv = Math.round(228-44*t), bv = Math.round(208-86*t);
      c.style.fontWeight  = w;
      c.style.color       = `rgb(${rv},${gv},${bv})`;
      c.style.textShadow  = t>0.22 ? `0 0 ${Math.round(t*24)}px rgba(180,148,82,${(t*0.65).toFixed(2)})` : 'none';
      c.style.transform   = `scale(${1+t*0.1}) translateY(${-t*5}px)`;
    });
  }
  function leave() {
    cont.querySelectorAll('.char').forEach(c => {
      c.style.fontWeight=c.style.color=c.style.textShadow=c.style.transform='';
    });
  }
  document.addEventListener('mousemove',  move);
  document.addEventListener('touchmove',  move, {passive:true});
  document.addEventListener('mouseleave', leave);
}

/* ══════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════ */
let isClickScrolling = false;
let scrollTimeout;

function scrollToSection(id) {
  const el = document.getElementById(id);
  if(!el) return;

  isClickScrolling = true;

  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.section === id);
  });

  window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 66, behavior:'smooth' });
  document.getElementById('navLinks').classList.remove('open');
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => { isClickScrolling = false; }, 800); 
}

function initScrollSpy() {
  const io = new IntersectionObserver(entries => {
    if (isClickScrolling) return;
    entries.forEach(e => {
      if(e.isIntersecting)
        document.querySelectorAll('.nav-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.section === e.target.id));
    });
  }, { rootMargin: '-50% 0px -40% 0px', threshold: 0 }); 
  document.querySelectorAll('.section').forEach(s => io.observe(s));
}

function observeFadeIn() {
  const io = new IntersectionObserver((es)=>{
    es.forEach((e,i)=>{ if(e.isIntersecting){ setTimeout(()=>e.target.classList.add('visible'),i*75); io.unobserve(e.target); } });
  },{threshold:0.08});
  document.querySelectorAll('.fade-in-up:not(.visible)').forEach(el=>io.observe(el));
}

async function fetchSheetData(sheetName, useHeaders = false) {
  const envResponse = await fetch('public/env.txt');
  if (!envResponse.ok) {
    return {};
  }
  const envText = await envResponse.text();
  const idMatch = envText.match(/^VITE_SPREADSHEET_ID\s*=\s*(.*)$/m);
  const SPREADSHEET_ID = idMatch ? idMatch[1].trim() : '';

  const headerParam = useHeaders ? "&headers=1" : "";
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json${headerParam}&sheet=${sheetName}`;
  const response = await fetch(url);
  if (!response.ok) {
    console.error('Failed to fetch sheet data', response.status);
    return {};
  }
  const text = await response.text();
  const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
  return JSON.parse(jsonString);
}


async function getSheetAsObject(sheetName) {
  try {
    const data = await fetchSheetData(sheetName, false);
    const result = {};
    if (!data || !data.table || !data.table.rows) return null;
    data.table.rows.forEach(row => {
      if (row && row.c && row.c[0] && row.c[1]) {
        const cellKey = row.c[0];
        const cellVal = row.c[1];
        const key = String(cellKey ? cellKey.v || "" : "").trim();
        const val = String(cellVal ? (cellVal.f !== undefined && cellVal.f !== null ? cellVal.f : (cellVal.v !== undefined && cellVal.v !== null ? cellVal.v : "")) : "").trim();
        if (key && key.toLowerCase() !== "key" && key.toLowerCase() !== "kolom") {
          result[key] = val;
        }
      }
    });
    return Object.keys(result).length > 0 ? result : null;
  } catch (e) { return null; }
}

async function getSheetAsArray(sheetName) {
  try {
    const data = await fetchSheetData(sheetName, true);
    const result = [];
    if (!data || !data.table || !data.table.rows) return null;
    
    let headers = data.table.cols.map(col => String(col ? col.label || "" : "").trim());
    let startIndex = 0;
    
    if (headers.every(h => !h)) {
      const firstRow = data.table.rows[0];
      if (!firstRow || !firstRow.c) return null;
      headers = firstRow.c.map(cell => String(cell ? cell.v || "" : "").trim());
      startIndex = 1;
    }

    for (let i = startIndex; i < data.table.rows.length; i++) {
      const row = data.table.rows[i];
      if (!row || !row.c) continue;
      const obj = {};
      headers.forEach((header, idx) => {
        if (header) {
          const cell = row.c[idx];
          let val = cell ? (cell.f !== undefined && cell.f !== null ? cell.f : (cell.v !== undefined && cell.v !== null ? cell.v : "")) : "";
          obj[header] = String(val).trim();
        }
      });
      result.push(obj);
    }
    return result.length > 0 ? result : null;
  } catch (e) { return null; }
}


async function loadAllData() {
  try {
    const [home, profile, experience, project, certification] = await Promise.all([
      getSheetAsObject("Home"),
      getSheetAsObject("Profile"),
      getSheetAsArray("Experience"),
      getSheetAsArray("Project"),
      getSheetAsArray("Certification")
    ]);

    if (!home && !profile && !experience && !project && !certification) {
      throw new Error("Gagal mengambil data dari Spreadsheet (mungkin tidak publik atau format tidak sesuai).");
    }

    renderHome(home || {}); 
    renderProfile(profile || {});
    renderExperience(experience || []); 
    renderProject(project || []);
    renderCertification(certification || []); 
    hideLoader();

  } catch (error) {
    console.error(error.message, error);
    console.log("Menggunakan data placeholder lokal...");
    loadPlaceholderData();
    hideLoader();
  }
}
